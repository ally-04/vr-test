<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🧠 能力評測塔 VR</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;overflow:hidden}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100}
#panel{position:absolute;top:20px;left:20px;background:rgba(255,255,255,.92);padding:20px;border-radius:12px;pointer-events:auto;min-width:280px;box-shadow:0 4px 20px rgba(0,0,0,.2)}
#panel h3{margin:0 0 15px 0;color:#333;font-size:17px;font-weight:bold}
.stat{display:flex;justify-content:space-between;align-items:center;margin:10px 0;font-size:13px}
.stat-l{color:#555;font-weight:600}
.stat-v{color:#f97316;font-weight:bold;font-size:15px}
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.92);color:white;padding:14px 28px;border-radius:10px;font-weight:bold;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
#toast.on{opacity:1}
#gaze-ring{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:110px;height:110px;border:4px solid rgba(249,115,22,.4);border-radius:50%;display:none;z-index:98;pointer-events:none}
#gaze-fill{position:absolute;width:100%;height:100%;border:4px solid #f97316;border-radius:50%;clip-path:polygon(50% 50%,50% 0%,100% 0%,100% 100%,0% 100%,0% 50%);opacity:0}
#gaze-txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#f97316;font-weight:bold;font-size:13px;white-space:nowrap}
#result{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);color:white;display:none;overflow-y:auto;z-index:200;padding:60px 40px}
#result.on{display:block}
#result h1{font-size:42px;color:#f97316;margin-bottom:40px;text-align:center}
.rcard{margin:25px 0;padding:20px;background:rgba(255,255,255,.1);border-left:5px solid #f97316;border-radius:8px}
.rcard strong{font-size:15px;display:block;margin-bottom:8px}
.rval{font-size:28px;color:#f97316;font-weight:bold;margin-top:5px}
#hint{position:fixed;bottom:15px;right:15px;font-size:11px;color:rgba(255,255,255,.5);text-align:right;line-height:1.7;pointer-events:none;text-shadow:0 1px 2px rgba(0,0,0,.5)}
</style>
</head>
<body>

<a-scene vr-mode-ui="enabled:true" background="color:#000" renderer="antialias:true">
  <a-light type="ambient" color="white" intensity="0.5"></a-light>
  
  <a-entity id="cam" position="0 1.6 0">
    <a-camera look-controls wasd-controls="acceleration:20">
      <a-cursor color="#f97316" fuse="false" raycaster="objects:.inter"></a-cursor>
    </a-camera>
  </a-entity>

  <!-- ===== Room 1: Logic (Blue Tech) ===== -->

    <!-- 互動物件 -->

    <a-box class="inter" position="0 2.5 -8" scale="0.75 0.75 0.75" color="#00ffff" data-score="0" data-val="20" animation="property:rotation;from:0 0 0;to:0 360 0;loop:true;dur:4000;easing:linear"></a-box>

    <a-sphere position="0 2.5 -8" radius="1" color="#00ffff" opacity="0.15" animation="property:radius;from:0.8;to:1.2;dir:alternate;loop:true;dur:1500;easing:easeInOutSine"></a-sphere>

</a-scene>

<div id="ui">
  <div id="panel">
    <h3>🧠 能力評測塔</h3>
    <div class="stat"><span class="stat-l">房間:</span><span id="room" class="stat-v">1/5</span></div>
    <div class="stat"><span class="stat-l">邏輯:</span><span id="s0" class="stat-v">0%</span></div>
    <div class="stat"><span class="stat-l">創意:</span><span id="s1" class="stat-v">0%</span></div>
    <div class="stat"><span class="stat-l">記憶:</span><span id="s2" class="stat-v">0%</span></div>
    <div class="stat"><span class="stat-l">社交:</span><span id="s3" class="stat-v">0%</span></div>
    <div class="stat"><span class="stat-l">決策:</span><span id="s4" class="stat-v">0%</span></div>
  </div>
  
  <div id="toast"></div>
  
  <div id="gaze-ring">
    <div id="gaze-fill"></div>
    <div id="gaze-txt">看著物件</div>
  </div>
  
  <div id="result">
    <h1>🧠 能力評測結果</h1>
    <div id="rcontent"></div>
  </div>
  
  <div id="hint">
    WASD 移動 · 滑鼠轉向<br>
    看著物件 2 秒凝視觸發<br>
    點擊右下角眼鏡進入 VR
  </div>
</div>

<script>
const G={room:1,scores:[0,0,0,0,0],target:null,t0:0};
const NAMES=['邏輯','創意','記憶','社交','決策'];

function show(m){
  const el=document.getElementById('toast');
  el.textContent=m;
  el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),2000);
}

function upd(){
  document.getElementById('room').textContent=`${G.room}/5`;
  for(let i=0;i<5;i++)document.getElementById(`s${i}`).textContent=`${G.scores[i]}%`;
}

function room(n){
  for(let i=1;i<=5;i++)document.getElementById(`room${i}`).setAttribute('visible',i===n);
  G.room=n;
  upd();
  show(`進入房間 ${n}`);
}

function res(){
  const avg=(G.scores[0]+G.scores[1]+G.scores[2]+G.scores[3]+G.scores[4])/5;
  let html='';
  for(let i=0;i<5;i++){
    html+=`<div class="rcard"><strong>${NAMES[i]}:</strong><div class="rval">${G.scores[i]}%</div></div>`;
  }
  html+=`<div class="rcard" style="margin-top:40px;border:3px solid #f97316;text-align:center"><strong style="font-size:18px">評語</strong><br>${avg>=80?'🌟 全能型能力者':avg>=60?'✨ 平衡型能力者':'🎯 專長型能力者'}</div>`;
  document.getElementById('rcontent').innerHTML=html;
  document.getElementById('result').classList.add('on');
}

function gaze(el){
  G.target=el;
  G.t0=Date.now();
  const ring=document.getElementById('gaze-ring');
  const fill=document.getElementById('gaze-fill');
  ring.style.display='block';
  
  const tick=()=>{
    const e=Date.now()-G.t0;
    const p=Math.min(e/2000,1);
    const angle=p*Math.PI*2;
    fill.style.clipPath=`polygon(50% 50%,50% 0%,${50+50*Math.cos(angle-Math.PI/2)}%,${50+50*Math.sin(angle-Math.PI/2)}%)`;
    document.getElementById('gaze-txt').textContent=Math.round(p*100)+'%';
    
    if(p<1&&G.target===el)requestAnimationFrame(tick);
    else if(p>=1){G.target=null;ring.style.display='none';click(el)}
  };
  tick();
}

function stopgaze(){G.target=null;document.getElementById('gaze-ring').style.display='none'}

function click(el){
  const nxt=el.getAttribute('data-next');
  const res2=el.getAttribute('data-result');
  const sc=el.getAttribute('data-score');
  const vl=parseInt(el.getAttribute('data-val')||'20');
  
  if(nxt){room(parseInt(nxt));return}
  if(res2){res();return}
  if(sc!==null){
    const idx=parseInt(sc);
    G.scores[idx]=Math.min(100,G.scores[idx]+vl);
    show(`${['🧩','🎨','📖','💬','⚖️'][idx]} ${NAMES[idx]}+${vl}`);
    upd();
    el.setAttribute('animation__pop',`property:scale;from:${el.getAttribute('scale')||'1 1 1'};to:1.25 1.25 1.25;dur:250;easing:easeOutQuad`);
  }
}

document.querySelector('a-scene').addEventListener('loaded',()=>{
  upd();
  document.querySelectorAll('.inter').forEach(el=>{
    el.addEventListener('mouseenter',()=>{if(!G.target)gaze(el)});
    el.addEventListener('mouseleave',()=>stopgaze());
    el.addEventListener('click',()=>{if(G.target)stopgaze();click(el)});
  });
});
</script>

</body>
</html>
